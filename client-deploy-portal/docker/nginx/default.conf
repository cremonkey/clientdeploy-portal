# ============================================================
# ClientDeploy Portal — Production Nginx Configuration
# ============================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=deploy:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Upstream backends
upstream laravel {
    server app:9000;
}

upstream nextjs {
    server frontend:3000;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check (allow over HTTP for monitoring)
    location = /api/health {
        proxy_pass http://laravel;
        proxy_set_header Host $host;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name portal.yourdomain.com;

    # ========================
    # SSL Configuration
    # ========================
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ========================
    # Security Headers
    # ========================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'" always;

    # ========================
    # General Settings
    # ========================
    client_max_body_size 50M;
    limit_conn conn_limit 20;

    # Hide server version
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ========================
    # Laravel API Routes
    # ========================
    location /api/ {
        # Auth endpoints — strict rate limit
        location /api/auth/login {
            limit_req zone=auth burst=3 nodelay;
            try_files $uri @laravel;
        }

        # Deploy endpoints — deployment rate limit
        location ~ /api/client/projects/\d+/deploy$ {
            limit_req zone=deploy burst=2 nodelay;
            try_files $uri @laravel;
        }

        # Webhook endpoints — separate limit
        location /api/webhooks/ {
            limit_req zone=webhook burst=10 nodelay;
            try_files $uri @laravel;
        }

        # Health check — no rate limit
        location = /api/health {
            try_files $uri @laravel;
        }

        # All other API routes
        limit_req zone=api burst=20 nodelay;
        try_files $uri @laravel;
    }

    # Laravel PHP-FPM upstream
    location @laravel {
        fastcgi_pass laravel;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        include fastcgi_params;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;

        # Timeouts for long deployments
        fastcgi_read_timeout 120;
        fastcgi_send_timeout 120;
    }

    # ========================
    # Block sensitive paths
    # ========================
    location ~ /\.(env|git|htaccess|htpasswd|svn) {
        deny all;
        return 404;
    }

    location ~ ^/(vendor|node_modules|storage/logs|storage/framework) {
        deny all;
        return 404;
    }

    # Block PHP execution in uploads
    location ~ ^/storage/.*\.php$ {
        deny all;
        return 404;
    }

    # ========================
    # Next.js Frontend (everything else)
    # ========================
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60;
    }

    # Static assets (cache aggressively)
    location /_next/static/ {
        proxy_pass http://nextjs;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
