
# ============================================================
# ClientDeploy Portal — Temporary HTTP Nginx Configuration
# Use this first to verify Laravel + Next.js are working.
# SSL/HTTPS can be added after the app is stable.
# ============================================================

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # ------------------------------------------------------------
    # Laravel API routes
    # ------------------------------------------------------------
    location /api {
        root /var/www/public;
        try_files $uri /index.php?$query_string;
    }

    # ------------------------------------------------------------
    # Laravel PHP-FPM handler
    # ------------------------------------------------------------
    location ~ \.php$ {
        root /var/www/public;

        include fastcgi_params;
	fastcgi_pass app:9000;
        fastcgi_index index.php;

        fastcgi_param SCRIPT_FILENAME /var/www/public$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /var/www/public;

        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;

        fastcgi_read_timeout 120;
        fastcgi_send_timeout 120;
    }

    # ------------------------------------------------------------
    # Block sensitive files
    # ------------------------------------------------------------
    location ~ /\.(env|git|htaccess|htpasswd|svn) {
        deny all;
        return 404;
    }

    location ~ ^/(vendor|node_modules|storage/logs|storage/framework) {
        deny all;
        return 404;
    }

    location ~ ^/storage/.*\.php$ {
        deny all;
        return 404;
    }

    # ------------------------------------------------------------
    # Next.js frontend
    # ------------------------------------------------------------
    location / {
	proxy_pass http://frontend:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60;
    }

    # ------------------------------------------------------------
    # Next.js static assets
    # ------------------------------------------------------------
    location /_next/static/ {
        proxy_pass http://frontend:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
