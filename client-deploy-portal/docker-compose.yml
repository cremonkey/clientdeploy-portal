services:
  app:
    build: { context: ./docker/app, dockerfile: Dockerfile }
    restart: unless-stopped
    working_dir: /var/www
    volumes: ['./backend:/var/www']
    depends_on: [postgres, redis]
    networks: [clientdeploy]

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api
    restart: unless-stopped
    ports: ['3000:3000']
    environment: ['NODE_ENV=production', 'NEXT_PUBLIC_API_URL=/api']
    depends_on: [app]
    networks: [clientdeploy]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: clientdeploy
      POSTGRES_USER: clientdeploy
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes: [postgres_data:/var/lib/postgresql/data]
    ports: ['127.0.0.1:5432:5432']
    networks: [clientdeploy]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret}
    volumes: [redis_data:/data]
    ports: ['127.0.0.1:6379:6379']
    networks: [clientdeploy]

  queue:
    build: { context: ./docker/app, dockerfile: Dockerfile }
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes: ['./backend:/var/www']
    depends_on: [app, redis]
    networks: [clientdeploy]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./backend/public:/var/www/public
    depends_on:
      - app
      - frontend
    networks:
      - clientdeploy

volumes:
  postgres_data: { driver: local }
  redis_data: { driver: local }

networks:
  clientdeploy: { driver: bridge }
